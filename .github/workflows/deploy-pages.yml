name: Deploy GitHub Pages

# Déploie la démo statique du frontend sur GitHub Pages à chaque push sur main.
# L'API Python n'étant pas hébergée sur Pages, le bouton "Analyser" se désactive
# proprement via la détection /api/health côté client (voir main.ts).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build TypeScript
        run: npm run build

      - name: Assemble public/
        run: |
          mkdir -p ../public
          cp src/index.html ../public/
          # On copie le CONTENU de dist/ à la racine de public/ (pas dist/ lui-même),
          # pour que <script src="./main.js"> fonctionne comme en local derrière nginx.
          cp -r dist/. ../public/
          # GitHub Pages utilise Jekyll par défaut et ignore certains dossiers ;
          # .nojekyll désactive tout ça et publie tel quel.
          touch ../public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
